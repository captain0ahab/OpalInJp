<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>鉱物産地探索マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; }
body { display: flex; flex-direction: column; background: #1a1a2e; color: #e8e8e8; }

/* ── ヘッダー ── */
header {
  padding: 8px 16px;
  background: #12122a;
  border-bottom: 2px solid #2980b9;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; z-index: 1000;
}
header h1 { font-size: 1rem; letter-spacing: 0.05em; }
.hint { margin-left: auto; font-size: 0.72rem; color: #7fb3d3; }

/* ── メイン ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── サイドバー ── */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: #12122a;
  border-right: 1px solid #1e3a5f;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.ctrl-panel { padding: 12px; border-bottom: 1px solid #1e3a5f; flex-shrink: 0; }
.result-panel { flex: 1; overflow-y: auto; padding: 10px; }

/* フォーム */
.fg { margin-bottom: 11px; }
.fg label {
  display: block; font-size: 0.69rem; color: #8baabf;
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
}
select {
  width: 100%; padding: 6px 8px;
  background: #1e3a5f; border: 1px solid #2d6a9f;
  border-radius: 4px; color: #e8e8e8; font-size: 0.87rem; cursor: pointer;
}
select:focus { outline: none; border-color: #5dade2; }

.radius-row { display: flex; align-items: center; gap: 8px; }
.radius-row input[type=range] { flex: 1; cursor: pointer; accent-color: #2980b9; }
.radius-val { font-size: 0.87rem; min-width: 48px; text-align: right; color: #5dade2; font-weight: bold; }

.coord-box {
  background: #0d1b2e; border: 1px solid #1e3a5f; border-radius: 4px;
  padding: 6px 8px; font-size: 0.79rem; color: #7fb3d3; margin-bottom: 11px;
  font-family: 'Courier New', monospace;
}

.btn-search {
  width: 100%; padding: 9px;
  background: #2980b9; color: white; border: none;
  border-radius: 4px; cursor: pointer;
  font-size: 0.93rem; font-weight: bold;
  transition: background 0.15s;
}
.btn-search:hover:not(:disabled) { background: #3498db; }
.btn-search:disabled { background: #1e3357; color: #4a6fa5; cursor: default; }

.btn-copy {
  width: 100%; padding: 7px; margin-top: 6px;
  background: #1e3a5f; color: #7fb3d3; border: 1px solid #2d6a9f;
  border-radius: 4px; cursor: pointer;
  font-size: 0.82rem; transition: background 0.15s;
}
.btn-copy:hover { background: #2d5a8e; color: #e8e8e8; }

/* ── スマートフォン対応 ── */
@media (max-width: 767px) {
  header { padding: 6px 10px; }
  header h1 { font-size: 0.88rem; }
  .hint { display: none; }

  .main { flex-direction: column; }

  /* 地図を上に、サイドバーを下に */
  #map { order: 1; height: 52vh; flex: none; }

  .sidebar {
    order: 2;
    width: 100%;
    max-height: 48vh;
    border-right: none;
    border-top: 2px solid #2980b9;
    overflow: hidden;
  }

  /* コントロールをグリッドで2列に */
  .ctrl-panel {
    padding: 8px 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    align-items: end;
  }
  .coord-box   { grid-column: 1 / -1; font-size: 0.72rem; margin-bottom: 0; }
  .fg          { margin-bottom: 0; }
  .fg:nth-child(2) { grid-column: 1; } /* 鉱物 */
  .fg:nth-child(3) { grid-column: 2; } /* 半径 */
  .btn-search  { grid-column: 1; margin-top: 2px; padding: 8px; font-size: 0.82rem; }
  .btn-copy    { grid-column: 2; margin-top: 2px; }

  /* 結果リスト */
  .result-panel { max-height: none; padding: 6px 8px; }
  .result-hdr   { font-size: 0.7rem; }
  .card         { padding: 6px 8px; }
  .card-score   { font-size: 1rem; }
}

/* 結果ヘッダー */
.result-hdr {
  font-size: 0.72rem; color: #8baabf;
  padding: 4px 0 8px; border-bottom: 1px solid #1e3a5f; margin-bottom: 8px;
  display: none;
}
.result-hdr b { color: #5dade2; }

.loading-msg { text-align: center; color: #8baabf; font-size: 0.82rem; padding: 20px 0; display: none; }

/* 結果カード */
.card {
  background: #0d1b2e; border-radius: 5px;
  border-left: 3px solid #2980b9;
  padding: 8px 10px; margin-bottom: 5px;
  cursor: pointer; transition: background 0.1s;
}
.card:hover { background: #142840; }
.card-top { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
.card-score { font-size: 1.1rem; font-weight: bold; }
.card-dist { font-size: 0.74rem; color: #7fb3d3; }
.badge {
  display: inline-block; font-size: 0.6rem;
  padding: 1px 5px; border-radius: 3px; vertical-align: middle;
}
.b-fault  { background: #922b21; }
.b-hot    { background: #1a5276; }
.card-lith { font-size: 0.74rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-age  { font-size: 0.7rem; color: #6ca; }

/* ── マップ ── */
#map { flex: 1; background: #1a1a2e; }

/* GSIタイルをダークモード化（色反転 + 色相補正） */
.dark-tiles { filter: invert(100%) hue-rotate(180deg) brightness(0.85) contrast(0.9); }

/* ── Leaflet ポップアップ ── */
.leaflet-popup-content-wrapper {
  background: #0d1b2e; color: #e8e8e8;
  border: 1px solid #2980b9; border-radius: 6px;
  box-shadow: 0 3px 14px rgba(0,0,0,.5);
}
.leaflet-popup-tip { background: #0d1b2e; }
.leaflet-popup-content { font-size: 0.81rem; line-height: 1.65; min-width: 220px; }
.p-score { font-size: 1.1rem; font-weight: bold; }
.p-divider { border-top: 1px solid #1e3a5f; margin: 6px 0; }
.p-minerals { font-size: 0.73rem; color: #8baabf; line-height: 1.7; }
.p-minerals b { color: #f0b429; }
.p-gmap { display: inline-block; margin-top: 6px; color: #5dade2; font-size: 0.75rem; text-decoration: none; }
.p-gmap:hover { text-decoration: underline; }
.p-formation { font-size: 0.71rem; color: #a9cce3; line-height: 1.6; margin-top: 5px; }
.p-formation strong { color: #5dade2; }
.mineral-info {
  background: #0a1628; border: 1px solid #2d5a8e; border-radius: 5px;
  padding: 8px 10px; margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 9px;
}
.mineral-info-icon { flex-shrink: 0; width: 28px; height: 28px; }
.mineral-info-icon svg { width: 28px; height: 28px; }
.mineral-info-text { font-size: 0.71rem; color: #a9cce3; line-height: 1.6; }
.mineral-info-text b { color: #5dade2; }
</style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">🗾</span>
  <h1>鉱物産地探索マップ</h1>
  <span class="hint">地図をクリック → 鉱物・半径を選択 → 調査</span>
</header>

<div class="main">

  <!-- ── サイドバー ── -->
  <div class="sidebar">
    <div class="ctrl-panel">

      <div class="coord-box" id="coordBox">地図をクリックして調査地点を選択</div>

      <div class="fg">
        <label>対象鉱物</label>
        <select id="mineralSel">
          <option value="all">── 全鉱物（合計スコア）</option>
          {% for key, name in minerals.items() %}
          <option value="{{ key }}">{{ name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="fg">
        <label>調査半径</label>
        <div class="radius-row">
          <input type="range" id="radiusSl" min="1" max="100" value="20"
                 oninput="document.getElementById('radiusNum').textContent=this.value">
          <span class="radius-val"><span id="radiusNum">20</span> km</span>
        </div>
      </div>

      <button class="btn-search" id="searchBtn" onclick="doSearch()" disabled>
        🔍 この地点を調査する
      </button>
      <button class="btn-copy" id="copyBtn" onclick="copyUrl()" style="display:none">
        🔗 このURLをコピー
      </button>
    </div>

    <div class="result-panel">
      <div class="result-hdr" id="resultHdr"></div>
      <div class="mineral-info" id="mineralInfo" style="display:none"></div>
      <div class="loading-msg" id="loadingMsg">⏳ 検索中...</div>
      <div id="resultList"></div>
    </div>
  </div>

  <!-- ── 地図 ── -->
  <div id="map"></div>

</div><!-- .main -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 定数 ──────────────────────────────────────────────
const MINERAL_KEYS = [
  'opal','gold','jade','quartz','garnet',
  'magnetite','fluorite','stibnite','rhodochrosite'
];
const MINERAL_NAMES = {
  all:'合計', opal:'オパール', gold:'砂金', jade:'翡翠', quartz:'水晶',
  garnet:'ザクロ石', magnetite:'磁鉄鉱', fluorite:'蛍石',
  stibnite:'輝安鉱', rhodochrosite:'菱マンガン鉱'
};

// ── 生成プロセス解説 ──────────────────────────────────────
const MINERAL_FORMATION = {
  all:          '複数の地質プロセスが複合的に作用するエリアを総合評価しています。',
  opal:         '低温熱水・火山岩の珪化作用によりシリカ（SiO₂）が地下水に溶解し、岩の空洞や割れ目に沈殿して形成。特に新生代火山岩地帯に多産。',
  gold:         '中〜高温の熱水鉱脈で濃集した後、長年の侵食・風化により河川に運ばれ、比重の大きさを利用して河床の砂礫中に二次濃集（砂金）する。',
  jade:         '沈み込み帯の高圧低温変成作用（ブルーシスト相）で生成するヒスイ輝石岩。糸魚川〜静岡構造線周辺は世界最古の産地の一つとして知られる。',
  quartz:       '熱水鉱脈・ペグマタイト・変成岩に広く産出。SiO₂が過飽和になった熱水が冷却・減圧するなかで六方晶系の柱状結晶（水晶）に成長する。',
  garnet:       '高温・高圧の変成岩（片麻岩・片岩）に多産。また石灰岩と花崗岩の接触変成帯で生じるスカルン型産地も多い。結晶形は菱形十二面体が典型。',
  magnetite:    '花崗岩と石灰岩の接触交代鉱床（スカルン）や塩基性火成岩体に濃集するFe₃O₄。強磁性を示し、砂鉄として河川・海岸にも二次濃集する。',
  fluorite:     '花崗岩周辺の中低温熱水鉱脈に産出するCaF₂。立方晶系で劈開が完全。紫・緑・黄・無色など豊富な色彩は希土類元素や放射線による格子欠陥による。',
  stibnite:     '低温熱水鉱脈（主に150〜200℃）に産出するアンチモンの硫化鉱物Sb₂S₃。鉛色の金属光沢をもつ長柱状〜針状結晶が集合し、日本は世界有数の産出国。',
  rhodochrosite:'熱水性・変成マンガン鉱床に産出するMnCO₃。方解石と同じ菱面体晶系でバラ色〜深紅色を呈する。秩父鉱山など日本の変成マンガン鉱床が有名。'
};

// ── 鉱物アイコン（SVG）────────────────────────────────────
const MINERAL_ICON_SVG = {
  all: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="12,2 21,9 17,22 7,22 3,9" fill="#2980b9" stroke="#1a5276" stroke-width="1"/><polygon points="12,2 21,9 12,13 3,9" fill="#5dade2" opacity="0.85"/><polygon points="3,9 12,13 7,22" fill="#1a78c2" opacity="0.9"/><polygon points="21,9 12,13 17,22" fill="#154360" opacity="0.9"/></svg>',

  opal: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><ellipse cx="12" cy="13" rx="10" ry="9" fill="#f0f0eb" stroke="#c8c8b8" stroke-width="1"/><ellipse cx="9" cy="11" rx="4" ry="3" fill="#87ceeb" opacity="0.55"/><ellipse cx="14" cy="15" rx="3" ry="2" fill="#ffb6c1" opacity="0.5"/><ellipse cx="13" cy="10" rx="2" ry="1.5" fill="#98fb98" opacity="0.45"/><ellipse cx="10" cy="15" rx="2" ry="1.2" fill="#dda0dd" opacity="0.4"/></svg>',

  gold: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="12,2 14.5,9 22,9 16,13.5 18.5,21 12,16.5 5.5,21 8,13.5 2,9 9.5,9" fill="#f4d03f" stroke="#d4ac0d" stroke-width="0.8"/><polygon points="12,5 13.8,10 18,10 14.5,12.5 15.8,17 12,14.5 8.2,17 9.5,12.5 6,10 10.2,10" fill="#f9e79f" opacity="0.7"/></svg>',

  jade: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="12,2 21,7 21,17 12,22 3,17 3,7" fill="#1e8449" stroke="#145a32" stroke-width="1"/><polygon points="12,5 18,8.5 18,15.5 12,19 6,15.5 6,8.5" fill="#27ae60" opacity="0.55"/><polygon points="12,8 15,9.8 15,14.2 12,16 9,14.2 9,9.8" fill="#52be80" opacity="0.45"/></svg>',

  quartz: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="12,1 19,6 19,21 12,23 5,21 5,6" fill="#a569bd" stroke="#7d3c98" stroke-width="1"/><polygon points="12,1 16,6 8,6" fill="#d7bde2" stroke="#7d3c98" stroke-width="0.7"/><line x1="10" y1="6" x2="10" y2="22" stroke="#7d3c98" stroke-width="0.5" opacity="0.45"/><line x1="14" y1="6" x2="14" y2="22" stroke="#7d3c98" stroke-width="0.5" opacity="0.45"/></svg>',

  garnet: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="12,1 23,12 12,23 1,12" fill="#922b21" stroke="#7b241c" stroke-width="1"/><polygon points="12,4 20,12 12,20 4,12" fill="#e74c3c" opacity="0.6"/><polygon points="12,7 17,12 12,17 7,12" fill="#f1948a" opacity="0.5"/></svg>',

  magnetite: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="9,2 15,2 22,9 22,15 15,22 9,22 2,15 2,9" fill="#212f3d" stroke="#566573" stroke-width="1"/><polygon points="10,5 14,5 19,10 19,14 14,19 10,19 5,14 5,10" fill="#566573" opacity="0.55"/><polygon points="11,8 13,8 16,11 16,13 13,16 11,16 8,13 8,11" fill="#808b96" opacity="0.4"/></svg>',

  fluorite: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="12,3 22,9 22,18 12,21 2,18 2,9" fill="#7d3c98" stroke="#6c3483" stroke-width="1"/><polygon points="12,3 22,9 12,11 2,9" fill="#bb8fce" opacity="0.85"/><polygon points="2,9 12,11 12,21 2,18" fill="#6c3483" opacity="0.95"/><polygon points="22,9 12,11 12,21 22,18" fill="#5b2c6f" opacity="0.95"/></svg>',

  stibnite: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="10.5" y="2" width="3" height="20" rx="1.5" fill="#7f8c8d" stroke="#5d6d7e" stroke-width="0.7" transform="rotate(-18,12,12)"/><rect x="10.5" y="2" width="2.5" height="20" rx="1.2" fill="#aab7b8" stroke="#5d6d7e" stroke-width="0.5"/><rect x="10.5" y="2" width="3" height="20" rx="1.5" fill="#95a5a6" stroke="#5d6d7e" stroke-width="0.7" transform="rotate(18,12,12)"/><rect x="11" y="3" width="2" height="18" rx="1" fill="#d5d8dc" opacity="0.55"/></svg>',

  rhodochrosite: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polygon points="12,2 22,9 19,22 5,22 2,9" fill="#e91e8c" stroke="#c2185b" stroke-width="1"/><polygon points="12,2 22,9 12,13 2,9" fill="#f48fb1" opacity="0.75"/><polygon points="2,9 12,13 5,22" fill="#c2185b" opacity="0.9"/><polygon points="22,9 12,13 19,22" fill="#ad1457" opacity="0.9"/></svg>'
};

// ── 地図初期化 ─────────────────────────────────────────
const map = L.map('map', { center:[36.5, 137.0], zoom:6 });

L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  attribution:'<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
  maxZoom:18,
  className:'dark-tiles'
}).addTo(map);

// 東京
L.circleMarker([35.6895, 139.6917], {
  radius:7, color:'#2980b9', fillColor:'#3498db', fillOpacity:0.9, weight:2
}).bindTooltip('東京', {permanent:true, direction:'right', className:'tokyo-tip'}).addTo(map);

// ── 状態 ─────────────────────────────────────────────
let selLat = null, selLon = null;
let pinMarker = null, radiusCircle = null;
const resultLayer = L.layerGroup().addTo(map);

// ── 地図クリック ───────────────────────────────────────
map.on('click', e => {
  selLat = parseFloat(e.latlng.lat.toFixed(5));
  selLon = parseFloat(e.latlng.lng.toFixed(5));

  document.getElementById('coordBox').textContent =
    selLat + '°N,  ' + selLon + '°E';
  document.getElementById('searchBtn').disabled = false;

  if (pinMarker) map.removeLayer(pinMarker);
  pinMarker = L.marker([selLat, selLon], {
    icon: L.divIcon({
      html: '<div style="font-size:26px;transform:translate(-50%,-100%)">📍</div>',
      iconSize: [0, 0], className: ''
    })
  }).addTo(map);
});

// ── 検索 ─────────────────────────────────────────────
function doSearch() {
  if (!selLat) return;

  const radius  = document.getElementById('radiusSl').value;
  const mineral = document.getElementById('mineralSel').value;
  const btn     = document.getElementById('searchBtn');

  // URL を更新（シェア用）
  const params = new URLSearchParams({ lat: selLat, lon: selLon, radius_km: radius, mineral });
  history.pushState(null, '', '?' + params.toString());
  document.getElementById('copyBtn').style.display = 'block';

  btn.disabled = true;
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('resultHdr').style.display  = 'none';
  document.getElementById('mineralInfo').style.display = 'none';
  document.getElementById('resultList').innerHTML = '';
  resultLayer.clearLayers();

  if (radiusCircle) map.removeLayer(radiusCircle);
  radiusCircle = L.circle([selLat, selLon], {
    radius: radius * 1000,
    color:'#2980b9', fillColor:'#2980b9', fillOpacity:0.05,
    weight:1.5, dashArray:'6 4'
  }).addTo(map);

  fetch('/api/search?lat=' + selLat + '&lon=' + selLon +
        '&radius_km=' + radius + '&mineral=' + mineral)
    .then(r => r.json())
    .then(renderResults)
    .catch(err => alert('エラー: ' + err.message))
    .finally(() => {
      btn.disabled = false;
      document.getElementById('loadingMsg').style.display = 'none';
    });
}

// ── URL コピー ────────────────────────────────────────
function copyUrl() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✅ コピーしました';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// ── URL パラメーターから自動復元 ──────────────────────
(function restoreFromUrl() {
  const p = new URLSearchParams(location.search);
  if (!p.has('lat') || !p.has('lon')) return;

  selLat = parseFloat(p.get('lat'));
  selLon = parseFloat(p.get('lon'));
  const radius  = p.get('radius_km') || '20';
  const mineral = p.get('mineral')   || 'all';

  document.getElementById('coordBox').textContent = selLat + '°N,  ' + selLon + '°E';
  document.getElementById('radiusSl').value       = radius;
  document.getElementById('radiusNum').textContent = radius;
  document.getElementById('mineralSel').value     = mineral;
  document.getElementById('searchBtn').disabled   = false;

  if (pinMarker) map.removeLayer(pinMarker);
  pinMarker = L.marker([selLat, selLon], {
    icon: L.divIcon({
      html: '<div style="font-size:26px;transform:translate(-50%,-100%)">📍</div>',
      iconSize: [0, 0], className: ''
    })
  }).addTo(map);

  map.setView([selLat, selLon], 9);
  doSearch();
})();

// ── 結果描画 ──────────────────────────────────────────
function ratioColor(ratio) {
  if (ratio >= 0.75) return '#e74c3c';
  if (ratio >= 0.50) return '#e67e22';
  if (ratio >= 0.25) return '#f1c40f';
  return '#5dade2';
}

function mineralBreakdown(row, labels) {
  const parts = [];
  for (const key of MINERAL_KEYS) {
    const v = row['score_' + key];
    if (v && v > 0) {
      const nm = (labels && labels[key]) || MINERAL_NAMES[key] || key;
      parts.push('<span style="color:#8baabf">' + nm + ':</span> <b>' + v.toFixed(1) + '</b>');
    }
  }
  if (row.score_hydrothermal && row.score_hydrothermal > 0)
    parts.push('<span style="color:#8baabf">熱水変質:</span> <b>' + row.score_hydrothermal.toFixed(1) + '</b>');
  return parts.join('&ensp;');
}

function renderResults(data) {
  document.getElementById('loadingMsg').style.display = 'none';

  const hdr     = document.getElementById('resultHdr');
  const list    = document.getElementById('resultList');
  const mineral = document.getElementById('mineralSel').value;
  hdr.style.display = 'block';

  // 生成プロセス情報パネルを更新
  const infoDiv = document.getElementById('mineralInfo');
  infoDiv.innerHTML =
    '<div class="mineral-info-icon">' + (MINERAL_ICON_SVG[mineral] || MINERAL_ICON_SVG.all) + '</div>' +
    '<div class="mineral-info-text"><b>' + (MINERAL_NAMES[mineral] || '全鉱物') + 'の生成プロセス:</b><br>' +
    (MINERAL_FORMATION[mineral] || MINERAL_FORMATION.all) + '</div>';
  infoDiv.style.display = 'flex';

  if (!data.results || data.results.length === 0) {
    hdr.innerHTML = 'この範囲に有望ポリゴンなし';
    return;
  }

  hdr.innerHTML = '範囲内 <b>' + data.count + '</b> ポリゴン / 上位 <b>' + data.results.length + '</b> 件';

  const maxScore = data.max_score || 1;

  data.results.forEach(row => {
    const score = row.sort_score || 0;
    const ratio = maxScore > 0 ? score / maxScore : 0;
    const c     = ratioColor(ratio);

    // ── カード ──
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderLeftColor = c;

    const faultBadge = row.near_fault ? '<span class="badge b-fault">断層近</span>' : '';
    const hotBadge   = (row.score_hydrothermal > 0) ? '<span class="badge b-hot">熱水</span>' : '';

    card.innerHTML =
      '<div class="card-top">' +
        '<span class="card-score" style="color:' + c + '">' + score.toFixed(1) + '</span>' +
        '<span class="card-dist">📍 ' + (row.dist_km || '?') + 'km</span>' +
        faultBadge + hotBadge +
      '</div>' +
      '<div class="card-lith">' + (row.lithology_ja || '—') + '</div>' +
      '<div class="card-age">' + (row.formationage_ja || '—') + '</div>';

    card.onclick = () => map.setView([row.lat, row.lon], 13);
    list.appendChild(card);

    // ── マーカー（鉱物アイコン＋スコア連動グロー）──
    const r        = 4 + ratio * 7;
    const iconSize = Math.round(r * 2.4 + 4);
    const glowPx   = Math.round(2 + ratio * 6);
    const icon     = L.divIcon({
      html: '<div style="width:' + iconSize + 'px;height:' + iconSize + 'px;' +
            'filter:drop-shadow(0 0 ' + glowPx + 'px ' + c + ')">' +
            (MINERAL_ICON_SVG[mineral] || MINERAL_ICON_SVG.all) + '</div>',
      iconSize:   [iconSize, iconSize],
      iconAnchor: [iconSize / 2, iconSize / 2],
      className:  ''
    });
    const marker = L.marker([row.lat, row.lon], { icon });

    const gmapUrl   = 'https://maps.google.com/maps?q=' + row.lat + ',' + row.lon;
    const mName     = MINERAL_NAMES[mineral] || '合計';
    const breakdown = mineralBreakdown(row, data.mineral_labels);
    const tokyoStr  = row.dist_tokyo_km ? '東京から: ' + Math.round(row.dist_tokyo_km) + ' km' : '';

    marker.bindPopup(
      '<span class="p-score" style="color:' + c + '">' + score.toFixed(1) + '</span>' +
      ' <span style="font-size:0.8rem;color:#8baabf">(' + mName + ')</span><br>' +
      '📍 調査地点から <b>' + (row.dist_km || '?') + ' km</b>' +
      (tokyoStr ? '&ensp;' + tokyoStr : '') + '<br>' +
      '🪨 ' + (row.lithology_ja || '—') + '<br>' +
      '📅 ' + (row.formationage_ja || '—') + '<br>' +
      '断層近接: ' + (row.near_fault ? '<span style="color:#e74c3c">○</span>' : '×') + '<br>' +
      (row.score_hydrothermal > 0 ? '熱水変質スコア: <b>' + row.score_hydrothermal.toFixed(1) + '</b><br>' : '') +
      '<div class="p-divider"></div>' +
      '<div class="p-minerals">' + (breakdown || '—') + '</div>' +
      '<div class="p-divider"></div>' +
      '<div class="p-formation"><strong>💡 生成プロセス:</strong><br>' +
      (MINERAL_FORMATION[mineral] || MINERAL_FORMATION.all) + '</div>' +
      '<a class="p-gmap" href="' + gmapUrl + '" target="_blank">📌 Google Maps で開く</a>',
      { maxWidth: 300 }
    );

    resultLayer.addLayer(marker);
  });
}

// Enter キーで検索
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('searchBtn').disabled) doSearch();
});
</script>
